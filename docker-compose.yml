version: "3.9"

x-common-env: &common-env
  TZ: Asia/Kolkata
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: automation_trade
  POSTGRES_USER: trade_user
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trade_secure_pwd_2026}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2

services:
  # ─── Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: trade_nginx
    restart: unless-stopped
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - trade_net

  # ─── Frontend (Next.js) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trade_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Kolkata
    networks:
      - trade_net

  # ─── One-shot Migration Sidecar ───
  # Runs alembic upgrade head + one-time SQLite -> Postgres import (if legacy
  # files are present and Postgres is empty), then exits. ALL other backend
  # services wait on this completing successfully.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trade_migrate
    restart: "no"
    command: ["true"]
    environment:
      <<: *common-env
      RUN_MIGRATIONS: "1"
      MIGRATE_ONLY: "1"
      LEGACY_SQLITE_DIR: /legacy
    volumes:
      - ./scripts:/app/scripts:ro
      - ./legacy_data:/legacy
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trade_net

  # ─── API (FastAPI + Gunicorn) ───
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trade_api
    restart: unless-stopped
    command: ["gunicorn", "app.main:app", "-w", "4", "-k", "uvicorn.workers.UvicornWorker", "--bind", "0.0.0.0:8000", "--timeout", "120", "--graceful-timeout", "30"]
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./downloads_concall:/app/downloads_concall
      # Legacy root-level Python modules used by app/routers/orders.py
      - ./gsheet_stock_get.py:/gsheet_stock_get.py:ro
      - ./get_quote.py:/get_quote.py:ro
      - ./place_order.py:/place_order.py:ro
      - ./neo_main_login.py:/neo_main_login.py:ro
      - ./neo_login:/neo_login:ro
      # Mount creds at /app (WORKDIR) so legacy get_quote.py finds them via
      # its relative path "google_sheets_credentials.json".
      - ./google_sheets_credentials.json:/app/google_sheets_credentials.json:ro
      - ./.env:/app/.env:ro
      # Kotak session — writable so TOTP auth + refresh persist across restarts.
      # Mounted at /app (the container WORKDIR) because session_manager.py uses
      # the relative filename "kotak_session.json".
      - ./kotak_session.json:/app/kotak_session.json
    networks:
      - trade_net

  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: trade_postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
      POSTGRES_DB: automation_trade
      POSTGRES_USER: trade_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trade_secure_pwd_2026}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_user -d automation_trade"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trade_net

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: trade_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trade_net

  # ─── Celery I/O Worker ───
  celery-io:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trade_celery_io
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app", "worker", "-Q", "io_queue", "-c", "20", "-n", "io@%h", "--pool=prefork", "--loglevel=info"]
    env_file:
      - .env
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./downloads_concall:/app/downloads_concall
      - ./gsheet_stock_get.py:/gsheet_stock_get.py:ro
      - ./get_quote.py:/get_quote.py:ro
      - ./place_order.py:/place_order.py:ro
      - ./neo_main_login.py:/neo_main_login.py:ro
      - ./neo_login:/neo_login:ro
      - ./google_sheets_credentials.json:/app/google_sheets_credentials.json:ro
      - ./.env:/app/.env:ro
      - ./kotak_session.json:/app/kotak_session.json
    networks:
      - trade_net

  # ─── Celery CPU Worker ───
  celery-cpu:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trade_celery_cpu
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app", "worker", "-Q", "cpu_queue", "-c", "4", "-n", "cpu@%h", "--pool=prefork", "--loglevel=info"]
    env_file:
      - .env
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./downloads_concall:/app/downloads_concall
      - ./gsheet_stock_get.py:/gsheet_stock_get.py:ro
      - ./get_quote.py:/get_quote.py:ro
      - ./place_order.py:/place_order.py:ro
      - ./neo_main_login.py:/neo_main_login.py:ro
      - ./neo_login:/neo_login:ro
      - ./google_sheets_credentials.json:/app/google_sheets_credentials.json:ro
      - ./.env:/app/.env:ro
      - ./kotak_session.json:/app/kotak_session.json
    networks:
      - trade_net

  # ─── Celery Beat Scheduler ───
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trade_celery_beat
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=info", "--pidfile=/tmp/celerybeat.pid"]
    env_file:
      - .env
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - trade_net

networks:
  trade_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
